components:
  schemas:
    AnalyzeQueryRequest:
      description: 自然语言查询请求 - 从 query 中自动识别股票
      properties:
        ohlcv_count:
          default: 300
          description: 日线OHLCV获取条数
          maximum: 5000.0
          minimum: 100.0
          title: Ohlcv Count
          type: integer
        query:
          description: 自然语言查询，如'帮我看看建科智能怎么样'，限120字
          maxLength: 120
          title: Query
          type: string
        selected_option:
          anyOf:
          - type: integer
          - type: 'null'
          description: 选择的选项索引（回应追问时使用）
          title: Selected Option
        session_id:
          anyOf:
          - type: string
          - type: 'null'
          description: 会话ID（多轮对话时携带）
          title: Session Id
        skip_clarification:
          default: true
          description: 意图模糊时跳过追问，自动选择全面分析（Dify等AI Agent默认开启）
          title: Skip Clarification
          type: boolean
        technical_count:
          default: 800
          description: 60m OHLCV获取条数
          maximum: 5000.0
          minimum: 400.0
          title: Technical Count
          type: integer
      required:
      - query
      title: AnalyzeQueryRequest
      type: object
    AnalyzeRequest:
      description: AI原生分析请求
      properties:
        feature_groups:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: 直接指定特征组（与query二选一）
          title: Feature Groups
        ohlcv_count:
          default: 300
          description: 日线OHLCV获取条数
          maximum: 5000.0
          minimum: 100.0
          title: Ohlcv Count
          type: integer
        query:
          anyOf:
          - maxLength: 120
            type: string
          - type: 'null'
          description: 自然语言需求描述（如'主力资金动向'，限120字）
          title: Query
        selected_option:
          anyOf:
          - type: integer
          - type: 'null'
          description: 选择的选项索引（回应追问时使用）
          title: Selected Option
        session_id:
          anyOf:
          - type: string
          - type: 'null'
          description: 会话ID（多轮对话时携带）
          title: Session Id
        stock_codes:
          description: 股票代码列表
          items:
            type: string
          minItems: 1
          title: Stock Codes
          type: array
        technical_count:
          default: 800
          description: 60m OHLCV获取条数
          maximum: 5000.0
          minimum: 400.0
          title: Technical Count
          type: integer
      required:
      - stock_codes
      title: AnalyzeRequest
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HotSectorRequest:
      description: 热门板块联动跟风策略请求
      properties:
        env_factor:
          anyOf:
          - type: number
          - type: 'null'
          description: 手动指定环境因子（1.0牛市/0.5熊市，None则自动检测）
          title: Env Factor
        limitup_codes:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: 手动指定涨停股代码列表（None则自动检测）
          title: Limitup Codes
        skip_llm:
          default: false
          description: 跳过LLM精选，直接返回评分Top3
          title: Skip Llm
          type: boolean
      title: HotSectorRequest
      type: object
    OHLCVRequest:
      description: OHLCV数据请求
      properties:
        count:
          default: 300
          description: 数据条数，建议至少300以支持所有特征计算
          maximum: 5000.0
          minimum: 100.0
          title: Count
          type: integer
        frequency:
          default: 1d
          title: Frequency
          type: string
        stock_codes:
          description: 股票代码列表，支持单个或多个股票，支持格式：'000001'、'SZ.000001'、'SH.600001'（6开头自动识别为沪市，其他为深市）
          items:
            type: string
          minItems: 1
          title: Stock Codes
          type: array
      required:
      - stock_codes
      title: OHLCVRequest
      type: object
    PortfolioHolding:
      description: 单个持仓
      properties:
        code:
          description: 股票代码，支持格式：'000001'、'SZ.000001'、'SH.600001'
          title: Code
          type: string
        cost_price:
          description: 持仓成本价
          exclusiveMinimum: 0.0
          title: Cost Price
          type: number
        quantity:
          description: 持仓数量（股）
          exclusiveMinimum: 0.0
          title: Quantity
          type: integer
      required:
      - code
      - cost_price
      - quantity
      title: PortfolioHolding
      type: object
    PortfolioRequest:
      description: 组合持仓分析请求
      properties:
        holdings:
          description: 持仓列表，最多10只
          items:
            $ref: '#/components/schemas/PortfolioHolding'
          maxItems: 10
          minItems: 1
          title: Holdings
          type: array
        ohlcv_count:
          default: 300
          description: 日线OHLCV获取条数
          maximum: 5000.0
          minimum: 100.0
          title: Ohlcv Count
          type: integer
        technical_count:
          default: 800
          description: 60m OHLCV获取条数
          maximum: 5000.0
          minimum: 400.0
          title: Technical Count
          type: integer
      required:
      - holdings
      title: PortfolioRequest
      type: object
    StockRequest:
      description: 股票请求基础模型（统一使用 stock_codes，市场自动识别）
      properties:
        stock_codes:
          description: 股票代码列表，支持单个或多个股票，支持格式：'000001'、'SZ.000001'、'SH.600001'（6开头自动识别为沪市，其他为深市）
          items:
            type: string
          minItems: 1
          title: Stock Codes
          type: array
      required:
      - stock_codes
      title: StockRequest
      type: object
    TechnicalFeatureRequest:
      description: 技术特征集请求
      properties:
        count:
          default: 800
          description: 60m数据条数，默认800以支持MA200计算(200天×4bars/天)
          maximum: 5000.0
          minimum: 400.0
          title: Count
          type: integer
        stock_codes:
          description: 股票代码列表，支持单个或多个股票，支持格式：'000001'、'SZ.000001'、'SH.600001'（6开头自动识别为沪市，其他为深市）
          items:
            type: string
          minItems: 1
          title: Stock Codes
          type: array
      required:
      - stock_codes
      title: TechnicalFeatureRequest
      type: object
    UnifiedAnalyzeResponse:
      additionalProperties: true
      description: 统一分析响应信封 - 三种策略共用
      properties:
        auto_selected:
          anyOf:
          - type: boolean
          - type: 'null'
          description: skip_clarification自动选择全面分析
          title: Auto Selected
        cache_stats:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: 缓存统计
          title: Cache Stats
        disclaimer:
          default: ''
          description: 免责声明
          title: Disclaimer
          type: string
        elapsed:
          anyOf:
          - type: number
          - type: 'null'
          description: 耗时(deprecated, 用elapsed_seconds)
          title: Elapsed
        elapsed_seconds:
          default: 0.0
          description: 耗时(秒)
          title: Elapsed Seconds
          type: number
        feature_groups:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: 特征组(stock_diagnosis)
          title: Feature Groups
        holdings:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: 持仓结果(portfolio)
          title: Holdings
        portfolio_report:
          anyOf:
          - type: string
          - type: 'null'
          description: 组合报告(portfolio)
          title: Portfolio Report
        portfolio_summary:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: 组合汇总(portfolio)
          title: Portfolio Summary
        reasoning:
          default: ''
          description: 意图推理过程
          title: Reasoning
          type: string
        result:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: 热门板块结果(hot_sector)
          title: Result
        results:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: 个股诊断结果(stock_diagnosis)
          title: Results
        session_id:
          anyOf:
          - type: string
          - type: 'null'
          description: 会话ID
          title: Session Id
        status:
          description: '状态: success | error | needs_clarification'
          title: Status
          type: string
        strategy:
          description: '响应类型: stock_diagnosis | hot_sector | portfolio'
          title: Strategy
          type: string
        summary:
          default: ''
          description: '统一报告: 所有股票诊断报告用 --- 分割, 多只时按情绪降序'
          title: Summary
          type: string
        timers:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: 各阶段计时
          title: Timers
        timestamp:
          default: ''
          description: ISO-8601 时间戳
          title: Timestamp
          type: string
        usage:
          additionalProperties: true
          description: LLM/embedding 用量统计
          title: Usage
          type: object
      required:
      - strategy
      - status
      title: UnifiedAnalyzeResponse
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    APIKeyHeader:
      in: header
      name: Authorization
      type: apiKey
info:
  description: A股股票分析API — 支持自然语言查询、技术指标分析、资金流分析、K线形态识别、热门板块联动和组合持仓分析
  title: AStockD 智能分析引擎 API
  version: 0.2.0
openapi: 3.1.0
paths:
  /:
    get:
      description: 服务状态
      operationId: root__get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - APIKeyHeader: []
      summary: Root
      tags:
      - 系统
  /analyze:
    post:
      description: "AI原生分析端点：自然语言 → 多轮推理 → 智能组合 → 统一响应\n\n- 首次请求: 传入query，可能返回追问(needs_clarification=True)\n\
        - 追问响应: 传入session_id + selected_option 或补充query\n- 直接指定: 传入feature_groups跳过推理\n\
        \n可用特征组: k_patterns, lifeline, experience, ohlcv_combined, technical,\n  \
        \          flow_minute, flow_daily, flow_combined"
      operationId: analyze_service_analyze_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Analyze Service
      tags:
      - AI分析-通用
  /analyze/full:
    post:
      description: '全量分析快捷端点：所有特征组一次性返回（无需推理）


        返回: technical + flow_daily + flow_minute + ohlcv_combined 全部特征'
      operationId: analyze_full_service_analyze_full_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Analyze Full Service
      tags:
      - AI分析-通用
  /analyze/hot-sector:
    post:
      description: '热门板块联动跟风策略：涨停股 → 联动跟风 → 技术筛选 → 评分排序 → LLM精选Top3


        流程:

        1. 检测今日涨停股（或手动指定）

        2. 通过历史联动数据查找跟风候选

        3. 技术面筛选（15m MA多头+量能多头+阳线+换手率）

        4. 评分排序取Top10

        5. LLM从Top10中对比精选Top3（可跳过）'
      operationId: hot_sector_service_analyze_hot_sector_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotSectorRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Hot Sector Service
      tags:
      - AI分析-策略
  /analyze/manifest:
    get:
      description: 返回特征清单，供前端/LLM了解可用特征
      operationId: feature_manifest_service_analyze_manifest_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - APIKeyHeader: []
      summary: Feature Manifest Service
      tags:
      - AI分析-元数据
  /analyze/portfolio:
    post:
      description: '组合持仓分析：输入持仓成本和数量，返回组合级 + 逐股分析报告


        对每只持仓执行完整分析流水线（技术指标+资金流+OHLCV+斐波那契），

        然后聚合组合级指标（总市值、盈亏、集中度、风险等级），

        最后由 LLM 生成包含具体参考价位的组合分析报告。


        报告包含免责声明，仅供参考，不构成投资建议。'
      operationId: portfolio_analysis_service_analyze_portfolio_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortfolioRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Portfolio Analysis Service
      tags:
      - AI分析-策略
  /analyze/query:
    post:
      description: '自然语言查询端点：从 query 中自动识别股票名称/代码，然后执行分析


        用户只需说 "帮我看看建科智能怎么样"，系统自动:

        1. 通过向量相似度搜索识别股票

        2. 回退到正则表达式提取股票代码

        3. 调用分析引擎执行分析


        无法识别股票时返回 400 错误。'
      operationId: analyze_by_query_analyze_query_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeQueryRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedAnalyzeResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Analyze By Query
      tags:
      - AI分析-查询
  /analyze/sessions/{session_id}:
    get:
      description: 查询会话状态（调试用）
      operationId: get_session_status_analyze_sessions__session_id__get
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          title: Session Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Get Session Status
      tags:
      - AI分析-元数据
  /features/all:
    post:
      description: '全量特征服务：返回技术+资金流(日线+分钟)+OHLCV全部特征

        数据粒度：最新一条截面特征'
      operationId: all_features_service_features_all_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: All Features Service
      tags:
      - 特征计算
  /features/combined:
    post:
      description: '合并特征服务

        提供K形态、生死线和经验特征的综合分析'
      operationId: combined_features_service_features_combined_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OHLCVRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Combined Features Service
      tags:
      - 特征计算
  /features/experience:
    post:
      description: '经验特征服务

        提供经验特征计算'
      operationId: experience_service_features_experience_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OHLCVRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Experience Service
      tags:
      - 特征计算
  /features/k-patterns:
    post:
      description: 'K形态特征服务

        提供K线形态特征计算'
      operationId: k_patterns_service_features_k_patterns_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OHLCVRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: K Patterns Service
      tags:
      - 特征计算
  /features/lifeline:
    post:
      description: '生死线特征服务

        提供生死线指标计算'
      operationId: lifeline_service_features_lifeline_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OHLCVRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Lifeline Service
      tags:
      - 特征计算
  /features/technical:
    post:
      description: '技术特征集服务

        计算212个技术指标特征: 60m时段特征(32) + 60m基础特征(27) + 日线特征(110) + 衍生特征(4) + Z-score技术(21)
        + Z-score资金流(18)

        基于60分钟K线数据, 支持时段提取(mstart/astart)和日线聚合, Z-score多窗口(10/20/60日) clip±3'
      operationId: technical_features_service_features_technical_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TechnicalFeatureRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Technical Features Service
      tags:
      - 特征计算
  /flow/combined:
    post:
      description: '合并资金流服务

        提供分钟级和日级资金流的综合分析，每个字段附带中文标签、描述和单位'
      operationId: combined_flow_service_flow_combined_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Combined Flow Service
      tags:
      - 资金流-原始
  /flow/daily:
    post:
      description: '日级资金流服务

        提供日线级资金流分析'
      operationId: daily_flow_service_flow_daily_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Daily Flow Service
      tags:
      - 资金流-原始
  /flow/minute:
    post:
